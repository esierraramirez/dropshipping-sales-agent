<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1800" viewBox="0 0 3200 1800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <style>
      .title { font: 700 56px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 26px Arial, sans-serif; fill: #475569; }
      .section { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 22px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 18px Arial, sans-serif; fill: #475569; }
      .sys { fill: #ecfeff; stroke: #0f766e; stroke-width: 5; rx: 34; ry: 34; }
      .person { fill: #dbeafe; stroke: #2563eb; stroke-width: 4; rx: 26; ry: 26; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 4; rx: 26; ry: 26; }
      .data { fill: #fff7ed; stroke: #ea580c; stroke-width: 4; rx: 26; ry: 26; }
      .ext { fill: #fdf2f8; stroke: #db2777; stroke-width: 4; rx: 26; ry: 26; }
      .line { stroke: #334155; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 16 12; }
    </style>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M0,0 L16,8 L0,16 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="3200" height="1800" fill="url(#bg)"/>
  <text x="100" y="110" class="title">C4 - Contexto del Sistema</text>
  <text x="100" y="160" class="subtitle">Vista de alto nivel de usuarios, sistema principal e integraciones externas</text>

  <rect x="100" y="330" width="360" height="180" class="person"/>
  <text x="280" y="395" text-anchor="middle" class="label">Vendor</text>
  <text x="280" y="435" text-anchor="middle" class="small">Usa el panel web</text>
  <text x="280" y="470" text-anchor="middle" class="small">Gestiona catalogo y ordenes</text>

  <rect x="100" y="600" width="360" height="180" class="person"/>
  <text x="280" y="665" text-anchor="middle" class="label">Administrador</text>
  <text x="280" y="705" text-anchor="middle" class="small">Supervisa el sistema</text>
  <text x="280" y="740" text-anchor="middle" class="small">Auditoria y salud</text>

  <rect x="600" y="260" width="1700" height="980" class="sys"/>
  <text x="1450" y="330" text-anchor="middle" class="section">Dropshipping Sales Agent</text>
  <text x="1450" y="375" text-anchor="middle" class="tiny">Frontend React + Backend FastAPI + Persistencia SQL + IA + WhatsApp + Auditoria</text>

  <rect x="720" y="500" width="300" height="170" class="box"/>
  <text x="870" y="560" text-anchor="middle" class="label">Frontend</text>
  <text x="870" y="600" text-anchor="middle" class="small">Dashboard, empresa, catalogo</text>
  <text x="870" y="635" text-anchor="middle" class="small">ordenes, agente, configuracion</text>

  <rect x="1090" y="500" width="300" height="170" class="box"/>
  <text x="1240" y="560" text-anchor="middle" class="label">API FastAPI</text>
  <text x="1240" y="600" text-anchor="middle" class="small">Rutas REST y validacion</text>
  <text x="1240" y="635" text-anchor="middle" class="small">Autenticacion y reglas de negocio</text>

  <rect x="1460" y="500" width="300" height="170" class="box"/>
  <text x="1610" y="560" text-anchor="middle" class="label">Servicios</text>
  <text x="1610" y="600" text-anchor="middle" class="small">Catalogo, ordenes, chat, RAG</text>
  <text x="1610" y="635" text-anchor="middle" class="small">auditoria, settings, whatsapp</text>

  <rect x="1830" y="500" width="300" height="170" class="box"/>
  <text x="1980" y="560" text-anchor="middle" class="label">Modelos ORM</text>
  <text x="1980" y="600" text-anchor="middle" class="small">Vendor, Product, Order</text>
  <text x="1980" y="635" text-anchor="middle" class="small">Settings, WhatsApp, AuditLog</text>

  <rect x="720" y="760" width="300" height="170" class="data"/>
  <text x="870" y="820" text-anchor="middle" class="label">Base SQL</text>
  <text x="870" y="860" text-anchor="middle" class="small">PostgreSQL / Supabase</text>
  <text x="870" y="895" text-anchor="middle" class="small">persistencia transaccional</text>

  <rect x="1090" y="760" width="300" height="170" class="data"/>
  <text x="1240" y="820" text-anchor="middle" class="label">Archivos</text>
  <text x="1240" y="860" text-anchor="middle" class="small">data/raw, processed, index</text>
  <text x="1240" y="895" text-anchor="middle" class="small">CSV CRUD y reportes</text>

  <rect x="1460" y="760" width="300" height="170" class="ext"/>
  <text x="1610" y="820" text-anchor="middle" class="label">OpenAI</text>
  <text x="1610" y="860" text-anchor="middle" class="small">Generacion de respuestas</text>
  <text x="1610" y="895" text-anchor="middle" class="small">LLM y soporte al agente</text>

  <rect x="1830" y="760" width="300" height="170" class="ext"/>
  <text x="1980" y="820" text-anchor="middle" class="label">WhatsApp Cloud API</text>
  <text x="1980" y="860" text-anchor="middle" class="small">Webhook y mensajeria</text>
  <text x="1980" y="895" text-anchor="middle" class="small">canal externo activo</text>

  <line x1="460" y1="420" x2="720" y2="585" class="line"/>
  <line x1="460" y1="690" x2="720" y2="585" class="line"/>
  <line x1="1020" y1="585" x2="1090" y2="585" class="line"/>
  <line x1="1390" y1="585" x2="1460" y2="585" class="line"/>
  <line x1="1760" y1="585" x2="1830" y2="585" class="line"/>
  <line x1="1610" y1="670" x2="1610" y2="760" class="line dash"/>
  <line x1="1980" y1="670" x2="1980" y2="760" class="line dash"/>
  <line x1="870" y1="670" x2="870" y2="760" class="line dash"/>
  <line x1="1240" y1="670" x2="1240" y2="760" class="line dash"/>

  <text x="1450" y="1080" text-anchor="middle" class="small">El sistema centraliza ventas, catalogo, ordenes, soporte IA, WhatsApp y auditoria.</text>
</svg>