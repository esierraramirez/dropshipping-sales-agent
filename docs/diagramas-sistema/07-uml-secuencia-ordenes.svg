<svg xmlns="http://www.w3.org/2000/svg" width="3400" height="1900" viewBox="0 0 3400 1900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafcff"/>
      <stop offset="100%" stop-color="#f6f7ff"/>
    </linearGradient>
    <style>
      .title { font: 700 56px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 26px Arial, sans-serif; fill: #475569; }
      .actor { fill: #dbeafe; stroke: #2563eb; stroke-width: 4; rx: 22; ry: 22; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 4; rx: 22; ry: 22; }
      .call { stroke: #334155; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .label { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .text { font: 400 20px Arial, sans-serif; fill: #334155; }
      .lane { stroke: #cbd5e1; stroke-width: 3; stroke-dasharray: 12 10; }
      .note { fill: #fef3c7; stroke: #f59e0b; stroke-width: 4; rx: 24; ry: 24; }
    </style>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M0,0 L16,8 L0,16 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="3400" height="1900" fill="url(#bg)"/>
  <text x="100" y="110" class="title">UML - Secuencia: Ordenes</text>
  <text x="100" y="160" class="subtitle">Creacion, consulta, actualizacion y eliminacion de una orden</text>

  <rect x="100" y="260" width="250" height="70" class="actor"/>
  <text x="225" y="305" text-anchor="middle" class="label">Vendor</text>
  <line x1="225" y1="330" x2="225" y2="1700" class="lane"/>

  <rect x="560" y="260" width="260" height="70" class="box"/>
  <text x="690" y="305" text-anchor="middle" class="label">Order Routes</text>
  <line x1="690" y1="330" x2="690" y2="1700" class="lane"/>

  <rect x="1020" y="260" width="260" height="70" class="box"/>
  <text x="1150" y="305" text-anchor="middle" class="label">Order Service</text>
  <line x1="1150" y1="330" x2="1150" y2="1700" class="lane"/>

  <rect x="1480" y="260" width="260" height="70" class="box"/>
  <text x="1610" y="305" text-anchor="middle" class="label">Order Model</text>
  <line x1="1610" y1="330" x2="1610" y2="1700" class="lane"/>

  <rect x="1960" y="260" width="260" height="70" class="box"/>
  <text x="2090" y="305" text-anchor="middle" class="label">Audit / DB</text>
  <line x1="2090" y1="330" x2="2090" y2="1700" class="lane"/>

  <rect x="560" y="430" width="340" height="92" class="note"/>
  <text x="730" y="470" text-anchor="middle" class="text">1. Crear orden</text>
  <text x="730" y="500" text-anchor="middle" class="text">POST /orders/me</text>
  <line x1="350" y1="475" x2="560" y2="475" class="call"/>

  <rect x="1020" y="600" width="390" height="92" class="note"/>
  <text x="1215" y="640" text-anchor="middle" class="text">2. Calcular total y normalizar items</text>
  <text x="1215" y="670" text-anchor="middle" class="text">serialize_order()</text>
  <line x1="690" y1="645" x2="1020" y2="645" class="call"/>

  <rect x="1480" y="770" width="390" height="92" class="note"/>
  <text x="1675" y="810" text-anchor="middle" class="text">3. Persistir Order</text>
  <text x="1675" y="840" text-anchor="middle" class="text">vendor_id, items_json, status</text>
  <line x1="1150" y1="815" x2="1480" y2="815" class="call"/>

  <rect x="1960" y="940" width="390" height="92" class="note"/>
  <text x="2155" y="980" text-anchor="middle" class="text">4. Commit + auditoria</text>
  <text x="2155" y="1010" text-anchor="middle" class="text">AuditLog y CSV CRUD</text>
  <line x1="1610" y1="985" x2="1960" y2="985" class="call"/>

  <rect x="560" y="1110" width="340" height="92" class="note"/>
  <text x="730" y="1150" text-anchor="middle" class="text">5. Listar / ver detalle</text>
  <text x="730" y="1180" text-anchor="middle" class="text">GET /orders/me y /orders/me/{id}</text>
  <line x1="350" y1="1155" x2="560" y2="1155" class="call"/>

  <rect x="1020" y="1280" width="390" height="92" class="note"/>
  <text x="1215" y="1320" text-anchor="middle" class="text">6. Actualizar estado</text>
  <text x="1215" y="1350" text-anchor="middle" class="text">PATCH /orders/me/{id}/status</text>
  <line x1="690" y1="1325" x2="1020" y2="1325" class="call"/>

  <rect x="1480" y="1450" width="390" height="92" class="note"/>
  <text x="1675" y="1490" text-anchor="middle" class="text">7. Eliminar orden</text>
  <text x="1675" y="1520" text-anchor="middle" class="text">DELETE /orders/me/{id}</text>
  <line x1="1150" y1="1495" x2="1480" y2="1495" class="call"/>
  <line x1="1610" y1="1495" x2="1960" y2="1495" class="call"/>

  <text x="100" y="1710" class="text">Resultado: orden creada, consultable, actualizable y trazada por auditoria.</text>
</svg>