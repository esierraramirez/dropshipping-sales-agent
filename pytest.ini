[pytest]
# Configuración de pytest para tests de catálogos
testpaths = backed/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    funcionalidad1: Validación de esquema
    funcionalidad2: Carga y validación
    funcionalidad3: Normalización
    funcionalidad4: Base de datos
    funcionalidad5: Base de conocimiento
